name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | cut -d '"' -f2)" >> $GITHUB_OUTPUT

      - name: Build
        run: cargo build --release --verbose --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/rmock target/${{ matrix.target }}/release/rmock-${{ steps.version.outputs.version }}-${{ matrix.target }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/rmock.exe target/${{ matrix.target }}/release/rmock-${{ steps.version.outputs.version }}-${{ matrix.target }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: rmock-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/rmock-${{ steps.version.outputs.version }}-${{ matrix.target }}${{ runner.os == 'Windows' && '.exe' || '' }}
